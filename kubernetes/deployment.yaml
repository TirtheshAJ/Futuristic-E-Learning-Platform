# Kubernetes Deployment Configuration for CodeStreak Academy

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: codestreak-academy

---
# ConfigMap for environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: codestreak-config
  namespace: codestreak-academy
data:
  NODE_ENV: "production"
  PORT: "5000"
  CORS_ORIGIN: "https://codestreakacademy.com"
  RATE_LIMIT_WINDOW: "15"
  RATE_LIMIT_MAX_REQUESTS: "100"

---
# Secrets (use kubectl create secret or external secrets operator)
apiVersion: v1
kind: Secret
metadata:
  name: codestreak-secrets
  namespace: codestreak-academy
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@postgres:5432/codestreak"
  REDIS_URL: "redis://:password@redis:6379"
  JWT_SECRET: "your-jwt-secret-here"
  REFRESH_TOKEN_SECRET: "your-refresh-secret-here"
  AWS_ACCESS_KEY_ID: "your-aws-key"
  AWS_SECRET_ACCESS_KEY: "your-aws-secret"
  SENDGRID_API_KEY: "your-sendgrid-key"
  GOOGLE_CLIENT_ID: "your-google-id"
  GOOGLE_CLIENT_SECRET: "your-google-secret"

---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: codestreak-academy
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: codestreak_academy
        - name: POSTGRES_USER
          value: codestreak
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: codestreak-secrets
              key: DB_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: codestreak-academy
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: codestreak-academy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: codestreak-secrets
              key: REDIS_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: codestreak-academy
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379

---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codestreak-api
  namespace: codestreak-academy
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: codestreak-api
  template:
    metadata:
      labels:
        app: codestreak-api
        version: v1
    spec:
      containers:
      - name: api
        image: ghcr.io/yourusername/codestreak-academy:latest
        ports:
        - containerPort: 5000
          name: http
        envFrom:
        - configMapRef:
            name: codestreak-config
        - secretRef:
            name: codestreak-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: codestreak-api
  namespace: codestreak-academy
spec:
  selector:
    app: codestreak-api
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP
  type: ClusterIP

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: codestreak-api-hpa
  namespace: codestreak-academy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: codestreak-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Ingress (NGINX)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codestreak-ingress
  namespace: codestreak-academy
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.codestreakacademy.com
    secretName: codestreak-tls
  rules:
  - host: api.codestreakacademy.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: codestreak-api
            port:
              number: 80

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: codestreak-api-pdb
  namespace: codestreak-academy
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: codestreak-api

---
# Network Policy (Security)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: codestreak-network-policy
  namespace: codestreak-academy
spec:
  podSelector:
    matchLabels:
      app: codestreak-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 5000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80

---
# ServiceMonitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: codestreak-api-metrics
  namespace: codestreak-academy
spec:
  selector:
    matchLabels:
      app: codestreak-api
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
